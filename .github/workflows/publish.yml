name: Publish

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
      - run: uv build
      - name: Compute artifact hashes
        id: hashes
        run: echo "hashes=$(sha256sum dist/* | base64 -w0)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: dist
          path: dist/

  provenance:
    needs: build
    if: github.event_name == 'release'
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true

  sign-release:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@a5caf349bc536fbef3668a10ed7f5cd309a4b53d  # v3.2.0
        with:
          inputs: >-
            dist/*.tar.gz
            dist/*.whl
      - name: Upload signatures to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" dist/*.sigstore.json --repo "${{ github.repository }}"

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: false
          skip-existing: true

  validate-testpypi:
    needs: publish-testpypi
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Verify package is on TestPyPI
        run: |
          PKG_VERSION="${GITHUB_REF_NAME#v}"
          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt: checking apicurio-serdes==${PKG_VERSION} on TestPyPI..."
            if pip download \
              --no-deps \
              --index-url https://test.pypi.org/simple/ \
              --dest /tmp/testpypi-check/ \
              "apicurio-serdes==${PKG_VERSION}"; then
              break
            fi
            [ "$attempt" -eq 5 ] && { echo "::error::Not found on TestPyPI after 5 attempts"; exit 1; }
            echo "Waiting $(( attempt * 15 ))s for index propagation..."
            sleep $(( attempt * 15 ))
          done
          BUILT_HASH=$(sha256sum dist/*.whl | awk '{print $1}')
          TESTPYPI_HASH=$(sha256sum /tmp/testpypi-check/*.whl | awk '{print $1}')
          [ "$BUILT_HASH" = "$TESTPYPI_HASH" ] \
            || { echo "::error::Hash mismatch: built=$BUILT_HASH testpypi=$TESTPYPI_HASH"; exit 1; }
          echo "Verified: TestPyPI artifact matches built wheel ($BUILT_HASH)"
      - name: Smoke test import
        run: |
          pip install dist/*.whl --extra-index-url https://pypi.org/simple/
          python -c "import apicurio_serdes; print(apicurio_serdes.__name__)"

  publish-pypi:
    needs: [validate-testpypi, provenance]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
        with:
          attestations: true
