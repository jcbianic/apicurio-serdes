name: Publish

on:
  release:
    types: [published]

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
      - run: uv build
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: dist
          path: dist/

  sign-release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@a5caf349bc536fbef3668a10ed7f5cd309a4b53d  # v3.2.0
        with:
          inputs: >-
            dist/*.tar.gz
            dist/*.whl
      - name: Upload signatures to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" dist/*.sigstore.json

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: false
          skip-existing: true

  validate-testpypi:
    needs: [publish-testpypi]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install from TestPyPI with retry
        run: |
          PKG_VERSION="${GITHUB_REF_NAME#v}"
          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt: installing apicurio-serdes==${PKG_VERSION} from TestPyPI..."
            if pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              "apicurio-serdes==${PKG_VERSION}"; then
              echo "Install succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::Failed to install from TestPyPI after 5 attempts"
              exit 1
            fi
            echo "Waiting $(( attempt * 15 ))s for index propagation..."
            sleep $(( attempt * 15 ))
          done
      - name: Smoke test import
        run: python -c "import apicurio_serdes; print(apicurio_serdes.__name__)"

  publish-pypi:
    needs: validate-testpypi
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0
        with:
          attestations: true
