name: Publish

on:
  release:
    types: [published]

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from pyproject.toml
        id: pkg
        run: |
          PKG_VERSION=$(python -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(data['project']['version'])
          ")
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
      - name: Compare with release tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="${{ steps.pkg.outputs.version }}"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Version mismatch: pyproject.toml has $PKG but release tag is $GITHUB_REF_NAME"
            exit 1
          fi

  build:
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@v1
        with:
          repository-url: https://test.pypi.org/legacy/

  validate-testpypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    steps:
      - name: Wait for index propagation
        run: sleep 30
      - name: Install from TestPyPI and smoke test
        env:
          PKG_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${PKG_VERSION#v}"
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "apicurio-serdes==${VERSION}"
          python -c "import apicurio_serdes; print(apicurio_serdes.__name__)"

  publish-pypi:
    needs: validate-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@v1
